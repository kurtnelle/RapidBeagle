# genimage.cfg — RapidBeagle SD card layout
# Two partitions:
#   1. boot.vfat (FAT16, ~16 MB): MLO, u-boot.img, zImage, DTB, uEnv.txt
#   2. rootfs.ext4 (~240 MB): the Linux rootfs

image boot.vfat {
    vfat {
        files = {
            "MLO",
            "u-boot.img",
            "zImage",
            "am335x-pocketbeagle.dtb",
            "uEnv.txt"
        }
    }
    size = 16M
}

image sdcard.img {
    hdimage {
    }

    partition u-boot {
        partition-type = 0xC
        bootable = "true"
        image = "boot.vfat"
    }

    partition rootfs {
        partition-type = 0x83
        image = "rootfs.ext4"
        size = 240M
    }
}
